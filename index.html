<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>TAKAHASHI KAI - Player Info</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1 class="pixel-font">PLAYER: TAKAHASHI KAI</h1>
        </header>

        <div class="profile-layout">
            <div class="status-window">
                <h2 class="title">STATUS</h2>
                <p>HP: 100/100 (元気)</p>
                <p>MP: 10/100 (デバッグ中につき枯渇)</p>
                <div class="exp-bar">EXP: <div class="progress"></div></div>
            </div>

            <div class="message-box" onclick="nextText()">
                <p id="dialogue">「やあ！僕は たかはしかい。GitHubで面白いものを作っているよ。」</p>
                <span class="arrow">▼</span>
            </div>
        </div>
    </div>

    <script>
        const texts = [
            "「やあ！僕は たかはしかい。GitHubで面白いものを作っているよ。」",
            "「最近は生成AIを使った脱出ゲームにハマっているんだ。」",
            "「君も一緒に面白いコードを書かないかい？」"
        ];
        let index = 0;
        function nextText() {
            index = (index + 1) % texts.length;
            document.getElementById('dialogue').innerText = texts[index];
        }
    </script>
</body>
</html>
